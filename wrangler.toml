name = "bitecode-agentic-orchestrator"
main = "src/index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = [ "nodejs_compat" ]

[vars]
ENVIRONMENT = "development"
AGENTIC_ADMIN_TOKEN = "local-dev-token"
ALLOWED_GOOGLE_DOMAIN = "gmail.com"
ADMIN_EMAIL_ALLOWLIST = ""
ATLASSIAN_BASE_URL = "https://example.atlassian.net"
ATLASSIAN_EMAIL = "ops@example.com"
ATLASSIAN_API_TOKEN = "placeholder"
JIRA_PROJECT_KEY = "BC"
CONFLUENCE_SPACE_KEY = "BITE"
CONFLUENCE_DEFAULT_PARENT_PAGE_ID = "0"
TELEGRAM_WEBHOOK_SECRET = "set-local-telegram-webhook-secret"
TELEGRAM_ADMIN_CHAT_IDS = ""

[[d1_databases]]
binding = "AGENT_DB"
database_name = "bitecode-agents-prod"
database_id = "cdc915cf-4286-459a-bff3-af61d628c7b0"

[[d1_databases]]
binding = "ADMIN_DB"
database_name = "bitecode-admin-prod"
database_id = "e4e52e31-44c1-4b83-b783-cf7d6cde4b88"

[[r2_buckets]]
binding = "AI_AUDIT_BUCKET"
bucket_name = "ai-audit-bucket"

[env.production]
name = "bitecode-agentic-orchestrator-prod"

[env.production.vars]
ENVIRONMENT = "production"
AGENTIC_ADMIN_TOKEN = "set-me-in-cloudflare-secrets"
ALLOWED_GOOGLE_DOMAIN = "gmail.com"
ADMIN_EMAIL_ALLOWLIST = ""
TELEGRAM_WEBHOOK_SECRET = "set-me-in-cloudflare-secrets"
TELEGRAM_ADMIN_CHAT_IDS = ""

[[env.production.d1_databases]]
binding = "AGENT_DB"
database_name = "bitecode-agents-prod"
database_id = "cdc915cf-4286-459a-bff3-af61d628c7b0"

[[env.production.d1_databases]]
binding = "ADMIN_DB"
database_name = "bitecode-admin-prod"
database_id = "00000000-0000-0000-0000-000000000000"

[[env.production.r2_buckets]]
binding = "AI_AUDIT_BUCKET"
bucket_name = "ai-audit-bucket"
