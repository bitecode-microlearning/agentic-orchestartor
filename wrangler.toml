name = "bitecode-agentic-orchestrator"
main = "src/index.ts"
compatibility_date = "2026-07-04"
compatibility_flags = [ "nodejs_compat" ]

[vars]
ENVIRONMENT = "development"
ALLOWED_GOOGLE_DOMAIN = "gmail.com"
ADMIN_EMAIL_ALLOWLIST = ""
ATLASSIAN_BASE_URL = "https://your-domain.atlassian.net"
ATLASSIAN_EMAIL = "jira-service-account@your-domain.com"
JIRA_PROJECT_KEY = "BC"
TELEGRAM_ADMIN_CHAT_IDS = ""
TELEGRAM_ALLOWED_USER_IDS = ""
TELEGRAM_CHAT_ID = ""
AI_MODEL = "deterministic-fallback"
INCIDENT_NOTIFICATION_THRESHOLDS = "1,3,7,15"
INCIDENT_REOPEN_COOLDOWN_MINUTES = "240"
APPROVAL_EXPIRATION_MINUTES = "60"
HEALTH_CHECK_TIMEOUT_MS = "30000"
AGENT_ENABLED = "true"

[[d1_databases]]
binding = "AGENT_DB"
database_name = "bitecode-agents-prod"
database_id = "cdc915cf-4286-459a-bff3-af61d628c7b0"

[[d1_databases]]
binding = "ADMIN_DB"
database_name = "bitecode-admin-prod"
database_id = "e4e52e31-44c1-4b83-b783-cf7d6cde4b88"

[triggers]
crons = ["*/15 * * * *"]

[[r2_buckets]]
binding = "AI_AUDIT_BUCKET"
bucket_name = "ai-audit-bucket"

[env.production]
name = "bitecode-agentic-orchestrator-prod"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_GOOGLE_DOMAIN = "gmail.com"
ADMIN_EMAIL_ALLOWLIST = ""
ATLASSIAN_BASE_URL = "https://bitecode.atlassian.net"
ATLASSIAN_EMAIL = "jira-service-account@your-domain.com"
JIRA_PROJECT_KEY = "BBD"
TELEGRAM_ADMIN_CHAT_IDS = ""
TELEGRAM_ALLOWED_USER_IDS = ""
TELEGRAM_CHAT_ID = ""
AI_MODEL = "deterministic-fallback"
INCIDENT_NOTIFICATION_THRESHOLDS = "1,3,7,15"
INCIDENT_REOPEN_COOLDOWN_MINUTES = "240"
APPROVAL_EXPIRATION_MINUTES = "60"
HEALTH_CHECK_TIMEOUT_MS = "30000"
AGENT_ENABLED = "true"

[[env.production.d1_databases]]
binding = "AGENT_DB"
database_name = "bitecode-agents-prod"
database_id = "cdc915cf-4286-459a-bff3-af61d628c7b0"

[[env.production.d1_databases]]
binding = "ADMIN_DB"
database_name = "bitecode-admin-prod"
database_id = "e4e52e31-44c1-4b83-b783-cf7d6cde4b88"

[[env.production.r2_buckets]]
binding = "AI_AUDIT_BUCKET"
bucket_name = "ai-audit-bucket"
